services:
  db:
    image: pgvector/pgvector:pg16
    container_name: syne-db
    environment:
      # Use environment variables for credentials (set by syne-setup.sh)
      # Falls back to 'syne' for existing installations
      POSTGRES_DB: ${SYNE_DB_NAME:-mnemosyne}
      POSTGRES_USER: ${SYNE_DB_USER:-syne}
      POSTGRES_PASSWORD: ${SYNE_DB_PASSWORD:-syne}
    ports:
      # Bind localhost only — never expose the DB to the public network.
      # 5433 (host) → 5432 (container) so we don't collide with a system
      # PostgreSQL install on the default port. Use 127.0.0.1: explicitly
      # so a hardened firewall isn't the only line of defense; Docker
      # publishes to all interfaces by default and that's the wrong
      # default for a DB holding OAuth tokens and every memory row.
      - "127.0.0.1:5433:5432"
    volumes:
      - syne_pgdata:/var/lib/postgresql/data
      - ./syne/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SYNE_DB_USER:-syne}"]
      interval: 5s
      timeout: 5s
      retries: 5

  syne:
    build: .
    container_name: syne-agent
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database URL constructed from env vars (set by syne-setup.sh)
      SYNE_DATABASE_URL: postgresql://${SYNE_DB_USER:-syne}:${SYNE_DB_PASSWORD:-syne}@db:5432/${SYNE_DB_NAME:-mnemosyne}
    env_file:
      - .env
    ports:
      - "8200:8200"
    restart: unless-stopped

volumes:
  syne_pgdata:
